<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nano Holding — Creative Company</title>
    <meta name="description" content="Nano Holding — O mercado existe na medida que é observado." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;1,500&display=swap"
      rel="stylesheet"
    />

    <!-- ===== Preloader (aparece instantâneo, cobre o carregamento) ===== -->
    <style>
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        transition: opacity 0.6s ease;
      }
      #preloader.hide {
        opacity: 0;
        pointer-events: none;
      }
      html.nano-loading {
        overflow: hidden;
      }

      #preloader .nano-loader {
        --uib-size: 60px;
        --uib-color: #0344d1; /* azul da marca (troca p/ #000 se quiser preto) */
        --uib-speed: 1.5s;
        --uib-dot-size: calc(var(--uib-size) * 0.1);
        position: relative;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        height: calc(var(--uib-size) * 0.64);
        width: calc(var(--uib-size) * 0.64);
      }

      @keyframes nano-jump {
        0%,
        100% {
          transform: translateY(120%);
        }
        50% {
          transform: translateY(-120%);
        }
      }

      #preloader .dot {
        --uib-d1: -0.48;
        --uib-d2: -0.4;
        --uib-d3: -0.32;
        --uib-d4: -0.24;
        --uib-d5: -0.16;
        --uib-d6: -0.08;
        --uib-d7: -0;
        position: absolute;
        bottom: calc(var(--uib-bottom) + var(--uib-dot-size) / 2);
        right: calc(var(--uib-right) + var(--uib-dot-size) / 2);
        display: flex;
        align-items: center;
        justify-content: flex-start;
        height: var(--uib-dot-size);
        width: var(--uib-dot-size);
        animation: nano-jump var(--uib-speed) ease-in-out infinite;
        opacity: var(--uib-scale);
        will-change: transform;
        backface-visibility: hidden;
      }
      #preloader .dot::before {
        content: '';
        height: 100%;
        width: 100%;
        background-color: var(--uib-color);
        border-radius: 50%;
        transform: scale(var(--uib-scale));
        transition: background-color 0.3s ease;
      }

      #preloader .dot:nth-child(1) {
        --uib-bottom: 24%;
        --uib-right: -35%;
        animation-delay: calc(var(--uib-speed) * var(--uib-d1));
      }
      #preloader .dot:nth-child(2) {
        --uib-bottom: 16%;
        --uib-right: -6%;
        animation-delay: calc(var(--uib-speed) * var(--uib-d2));
      }
      #preloader .dot:nth-child(3) {
        --uib-bottom: 8%;
        --uib-right: 23%;
        animation-delay: calc(var(--uib-speed) * var(--uib-d3));
      }
      #preloader .dot:nth-child(4) {
        --uib-bottom: -1%;
        --uib-right: 51%;
        animation-delay: calc(var(--uib-speed) * var(--uib-d4));
      }
      #preloader .dot:nth-child(5) {
        --uib-bottom: 38%;
        --uib-right: -17.5%;
        animation-delay: calc(var(--uib-speed) * var(--uib-d2));
      }
      #preloader .dot:nth-child(6) {
        --uib-bottom: 30%;
        --uib-right: 10%;
        animation-delay: calc(var(--uib-speed) * var(--uib-d3));
      }
      #preloader .dot:nth-child(7) {
        --uib-bottom: 22%;
        --uib-right: 39%;
        animation-delay: calc(var(--uib-speed) * var(--uib-d4));
      }
      #preloader .dot:nth-child(8) {
        --uib-bottom: 14%;
        --uib-right: 67%;
        animation-delay: calc(var(--uib-speed) * var(--uib-d5));
      }
      #preloader .dot:nth-child(9) {
        --uib-bottom: 53%;
        --uib-right: -0.8%;
        animation-delay: calc(var(--uib-speed) * var(--uib-d3));
      }
      #preloader .dot:nth-child(10) {
        --uib-bottom: 44.5%;
        --uib-right: 27%;
        animation-delay: calc(var(--uib-speed) * var(--uib-d4));
      }
      #preloader .dot:nth-child(11) {
        --uib-bottom: 36%;
        --uib-right: 55.7%;
        animation-delay: calc(var(--uib-speed) * var(--uib-d5));
      }
      #preloader .dot:nth-child(12) {
        --uib-bottom: 28.7%;
        --uib-right: 84.3%;
        animation-delay: calc(var(--uib-speed) * var(--uib-d6));
      }
      #preloader .dot:nth-child(13) {
        --uib-bottom: 66.8%;
        --uib-right: 15%;
        animation-delay: calc(var(--uib-speed) * var(--uib-d4));
      }
      #preloader .dot:nth-child(14) {
        --uib-bottom: 58.8%;
        --uib-right: 43%;
        animation-delay: calc(var(--uib-speed) * var(--uib-d5));
      }
      #preloader .dot:nth-child(15) {
        --uib-bottom: 50%;
        --uib-right: 72%;
        animation-delay: calc(var(--uib-speed) * var(--uib-d6));
      }
      #preloader .dot:nth-child(16) {
        --uib-bottom: 42%;
        --uib-right: 100%;
        animation-delay: calc(var(--uib-speed) * var(--uib-d7));
      }

      #preloader .dot:nth-child(3) {
        --uib-scale: 0.98;
      }
      #preloader .dot:nth-child(2),
      #preloader .dot:nth-child(8) {
        --uib-scale: 0.96;
      }
      #preloader .dot:nth-child(1),
      #preloader .dot:nth-child(7) {
        --uib-scale: 0.94;
      }
      #preloader .dot:nth-child(6),
      #preloader .dot:nth-child(12) {
        --uib-scale: 0.92;
      }
      #preloader .dot:nth-child(5),
      #preloader .dot:nth-child(11) {
        --uib-scale: 0.9;
      }
      #preloader .dot:nth-child(10),
      #preloader .dot:nth-child(16) {
        --uib-scale: 0.88;
      }
      #preloader .dot:nth-child(9),
      #preloader .dot:nth-child(15) {
        --uib-scale: 0.86;
      }
      #preloader .dot:nth-child(14) {
        --uib-scale: 0.84;
      }
      #preloader .dot:nth-child(13) {
        --uib-scale: 0.82;
      }

      @media (prefers-reduced-motion: reduce) {
        #preloader .dot {
          animation-duration: 3s;
        }
      }
    </style>
  </head>
  <body>
    <!-- Preloader: fica fora do #root, o React não mexe nele -->
    <div id="preloader" role="status" aria-label="Carregando">
      <div class="nano-loader" aria-hidden="true">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <script>
      (function () {
        var MIN = 2000; // mínimo 2s na tela
        var MAX = 5000; // teto de segurança (não trava se algo demorar)
        var start = Date.now();
        var done = false;

        function hide() {
          if (done) return;
          done = true;
          var el = document.getElementById('preloader');
          document.documentElement.classList.remove('nano-loading');
          if (!el) return;
          el.classList.add('hide');
          setTimeout(function () {
            if (el && el.parentNode) el.parentNode.removeChild(el);
          }, 700); // depois do fade
        }

        document.documentElement.classList.add('nano-loading');
        // teto: some no máximo em MAX
        setTimeout(hide, MAX);
        // ideal: some quando a página terminou de carregar, respeitando o mínimo de 2s
        window.addEventListener('load', function () {
          var waited = Date.now() - start;
          setTimeout(hide, Math.max(0, MIN - waited));
        });
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
